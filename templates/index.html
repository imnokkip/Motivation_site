<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>(^^)</title>
    <style>
        body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background: url("{{ picture }}") no-repeat;
            background-size: cover;
            position: relative;
        }

        
        h1 {
            color: #fff;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            border: 9px solid;
            padding: 150px;
            border-radius: 10px;
            font-size: 30px;
            white-space: nowrap;
        }
        h1 span {
            display: block;
            font-size: 18px;
            margin-top: 15px;
            color: #666;
            font-style: italic;
        }
        .cover{
          background: rgba(0, 0, 0, 0.5);
          position: absolute;
          top: 0;
          bottom: 0;
          left: 0;
          right: 0;
        }
        
    </style>
</head>
<body>
    <div class="cover"></div>
  
    <h1>"{{ quota }}"</h1>
</body>
</html>
